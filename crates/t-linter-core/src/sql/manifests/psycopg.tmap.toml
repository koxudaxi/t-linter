[manifest]
format = "tstring-type-map/1"
language = "sql"
dialect = "postgresql"
library = "psycopg"
library-versions = ">=3.3"

[param-accepts]
bool = { type = "bool" }
"int2|int4|int8" = { type = "int" }
"float4|float8" = { type = "float | int" }
numeric = { type = "decimal.Decimal | int | float", imports = ["decimal"] }
"text|varchar|bpchar" = { type = "str" }
bytea = { type = "bytes | bytearray | memoryview" }
date = { type = "datetime.date", imports = ["datetime"] }
"timestamp|timestamptz" = { type = "datetime.datetime", imports = ["datetime"] }
"time|timetz" = { type = "datetime.time", imports = ["datetime"] }
interval = { type = "datetime.timedelta", imports = ["datetime"] }
uuid = { type = "uuid.UUID", imports = ["uuid"] }
"json|jsonb" = { type = "psycopg.types.json.Json | psycopg.types.json.Jsonb", imports = ["psycopg.types.json"] }
inet = { type = "ipaddress.IPv4Address | ipaddress.IPv6Address | ipaddress.IPv4Interface | ipaddress.IPv6Interface | str", imports = ["ipaddress"] }
"_*" = { type = "list" }
default = { type = "object" }

[spec-accepts]
top = { type = "bool | int | float | decimal.Decimal | str | bytes | datetime.date | datetime.datetime | datetime.time | datetime.timedelta | uuid.UUID | list | psycopg.types.json.Json | psycopg.types.json.Jsonb | None", imports = ["decimal", "datetime", "uuid", "psycopg.types.json"] }
s = { type = "bool | int | float | decimal.Decimal | str | bytes | datetime.date | datetime.datetime | datetime.time | datetime.timedelta | uuid.UUID | list | psycopg.types.json.Json | psycopg.types.json.Jsonb | None", imports = ["decimal", "datetime", "uuid", "psycopg.types.json"] }
b = { type = "bool | int | float | decimal.Decimal | str | bytes | datetime.date | datetime.datetime | datetime.time | datetime.timedelta | uuid.UUID | list | psycopg.types.json.Json | psycopg.types.json.Jsonb | None", imports = ["decimal", "datetime", "uuid", "psycopg.types.json"] }
t = { type = "bool | int | float | decimal.Decimal | str | bytes | datetime.date | datetime.datetime | datetime.time | datetime.timedelta | uuid.UUID | list | psycopg.types.json.Json | psycopg.types.json.Jsonb | None", imports = ["decimal", "datetime", "uuid", "psycopg.types.json"] }
l = { type = "bool | int | float | decimal.Decimal | str | bytes | datetime.date | datetime.datetime | datetime.time | datetime.timedelta | uuid.UUID | list | psycopg.types.json.Json | psycopg.types.json.Jsonb | None", imports = ["decimal", "datetime", "uuid", "psycopg.types.json"] }
i = { type = "str | psycopg.sql.Identifier", imports = ["psycopg.sql"] }
q = { type = "string.templatelib.Template | psycopg.sql.SQL | psycopg.sql.Composed", imports = ["string.templatelib", "psycopg.sql"] }
