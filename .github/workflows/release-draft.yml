name: Release Draft

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

concurrency:
  group: release-draft
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-draft:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure breaking-change label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "breaking-change" --color "D93F0B" --description "PR contains breaking changes" 2>/dev/null || true

      - name: Calculate next version and update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_BREAKING_CHANGE: ${{ contains(github.event.pull_request.labels.*.name, 'breaking-change') }}
        run: |
          set -euo pipefail

          PROJECT_VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as f:
              data = tomllib.load(f)

          print(data["project"]["version"])
          PY
          )

          RELEASES_JSON=$(gh release list --limit 100 --json tagName,isDraft)
          export PROJECT_VERSION RELEASES_JSON HAS_BREAKING_CHANGE

          VERSION_INFO=$(python3 - <<'PY'
          import json
          import os
          import re

          semver_pattern = re.compile(r"(\d+\.\d+\.\d+)$")
          releases = json.loads(os.environ["RELEASES_JSON"])

          latest_published_tag = "v0.0.0"
          latest_published_version = "0.0.0"
          draft_tag = ""
          draft_version = ""

          def version_tuple(value: str) -> tuple[int, int, int]:
              major, minor, patch = value.split(".", 2)
              return int(major), int(minor), int(patch)

          published_versions: list[tuple[tuple[int, int, int], str, str]] = []
          for release in releases:
              match = semver_pattern.search(release["tagName"])
              if not match:
                  continue
              parsed_version = match.group(1)
              parsed_tuple = version_tuple(parsed_version)
              if release.get("isDraft"):
                  if not draft_version or parsed_tuple > version_tuple(draft_version):
                      draft_version = parsed_version
                      draft_tag = release["tagName"]
              else:
                  published_versions.append((parsed_tuple, parsed_version, release["tagName"]))

          if published_versions:
              published_versions.sort()
              _, latest_published_version, latest_published_tag = published_versions[-1]

          print(latest_published_tag)
          print(latest_published_version)
          print(draft_tag)
          print(draft_version)
          PY
          )

          LATEST_TAG_RAW=$(printf '%s\n' "$VERSION_INFO" | sed -n '1p')
          LATEST_TAG=$(printf '%s\n' "$VERSION_INFO" | sed -n '2p')
          DRAFT_TAG_RAW=$(printf '%s\n' "$VERSION_INFO" | sed -n '3p')
          DRAFT_TAG=$(printf '%s\n' "$VERSION_INFO" | sed -n '4p')
          export PROJECT_VERSION LATEST_TAG DRAFT_TAG HAS_BREAKING_CHANGE

          NEXT_VERSION=$(python3 - <<'PY'
          import os

          def parse_version(value: str) -> tuple[int, int, int]:
              try:
                  major, minor, patch = value.split(".", 2)
                  return int(major), int(minor), int(patch)
              except Exception:
                  return (0, 0, 0)

          project_version = os.environ["PROJECT_VERSION"]
          latest_tag = os.environ["LATEST_TAG"]
          draft_tag = os.environ["DRAFT_TAG"]
          has_breaking_change = os.environ["HAS_BREAKING_CHANGE"] == "true"

          if parse_version(latest_tag) == (0, 0, 0):
              candidate = project_version
          elif draft_tag:
              candidate = draft_tag
          else:
              major, minor, patch = parse_version(latest_tag)
              if has_breaking_change:
                  candidate = f"{major}.{minor + 1}.0"
              else:
                  candidate = f"{major}.{minor}.{patch + 1}"

          if parse_version(candidate) < parse_version(project_version):
              candidate = project_version

          print(candidate)
          PY
          )

          NEXT_TAG="v$NEXT_VERSION"

          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "0.0.0" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$NEXT_TAG" \
              -f previous_tag_name="$LATEST_TAG_RAW" \
              --jq '.body' > generated_notes.md
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$NEXT_TAG" \
              --jq '.body' > generated_notes.md
          fi

          if [ "$HAS_BREAKING_CHANGE" = "true" ]; then
            python3 scripts/compose_release_notes.py \
              --generated-notes-file generated_notes.md \
              --breaking-pr-number "${{ github.event.pull_request.number }}" > release_body.md
          else
            python3 scripts/compose_release_notes.py \
              --generated-notes-file generated_notes.md > release_body.md
          fi

          python3 scripts/validate_release_notes.py release_body.md

          if [ -n "$DRAFT_TAG_RAW" ]; then
            gh release edit "$DRAFT_TAG_RAW" \
              --title "$NEXT_VERSION" \
              --notes-file release_body.md
          else
            gh release create "$NEXT_TAG" \
              --title "$NEXT_VERSION" \
              --notes-file release_body.md \
              --draft
          fi
