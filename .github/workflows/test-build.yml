name: Test Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install LSP e2e tools
      run: |
        uv tool install ruff==0.15.13
        uv tool install ty==0.0.56
        uv tool install pyrefly==1.1.1
        npm install -g pyright@1.1.411
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Rust tests
      run: cargo test --workspace
    
    - name: Build wheel
      uses: PyO3/maturin-action@v1
      with:
        args: --release --out dist
        manylinux: '2_28'
    
    - name: Test installation
      run: |
        pip install dist/*.whl
        t-linter --version

  psycopg-conformance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@1.94.0

    - name: Build t-linter
      run: cargo build --bin t-linter

    - name: Run psycopg conformance
      run: |
        uv venv --python 3.14 .psycopg-venv
        uv pip install --python .psycopg-venv/bin/python "psycopg[binary]>=3.3"
        T_LINTER_BIN="$PWD/target/debug/t-linter" .psycopg-venv/bin/python scripts/psycopg_conformance.py

  sql-catalog:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tlinter
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tlinter"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@1.94.0

    - name: Run SQL catalog integration
      env:
        T_LINTER_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tlinter
      run: |
        uv tool install ty==0.0.56
        export PATH="$HOME/.local/bin:$PATH"
        uv venv --python 3.14 .sql-catalog-venv
        uv pip install --python .sql-catalog-venv/bin/python "psycopg[binary]>=3.3"
        T_LINTER_SQL_PYTHON="$PWD/.sql-catalog-venv/bin/python" \
          cargo test -p t-linter --test type_check_lsp \
          sql_catalog_cache_drives_lsp_type_diagnostics_from_real_database -- --nocapture
