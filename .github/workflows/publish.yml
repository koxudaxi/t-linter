name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-wheels:
    if: ${{ startsWith(github.event.release.tag_name, 'v') }}
    name: Build wheels
    strategy:
      matrix:
        include:
          - os: linux
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: linux
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - os: macos
            target: aarch64-apple-darwin
            runner: macos-14
          - os: windows
            target: x86_64-pc-windows-msvc
            runner: windows-latest
    
    runs-on: ${{ matrix.runner }}
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}

      - name: Synchronize release version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          python3 scripts/set_release_versions.py --python-version "$VERSION" --vscode-version "$VERSION"

      - name: Build wheel (Linux manylinux)
        if: ${{ matrix.os == 'linux' }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --compatibility pypi -i python3.14
          sccache: "true"
          manylinux: "2_28"

      - name: Build wheel (host)
        if: ${{ matrix.os != 'linux' }}
        shell: bash
        run: |
          PYTHON_BIN="$(uv run --python 3.14 python - <<'PY'
          import sys
          print(sys.executable)
          PY
          )"
          uvx maturin build --release --target "${{ matrix.target }}" --out dist --compatibility pypi -i "$PYTHON_BIN"

      - name: Check distribution metadata
        shell: bash
        run: uvx twine check dist/*

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*

  build-sdist:
    if: ${{ startsWith(github.event.release.tag_name, 'v') }}
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Synchronize release version
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          python3 scripts/set_release_versions.py --python-version "$VERSION" --vscode-version "$VERSION"

      - name: Build source distribution
        run: uvx maturin sdist --out dist

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  publish:
    if: ${{ startsWith(github.event.release.tag_name, 'v') }}
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    environment:
      name: pypi
      url: https://pypi.org/project/t-linter/
    permissions:
      id-token: write
    
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          attestations: false
